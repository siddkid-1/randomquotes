<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>random quote generator</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        
        body {
            height:100vh;
            overflow:hidden;
            display:flex;
            justify-content:center;
            font-family:Georgia, serif;
            color:white;
            /* REPLACE background.jpg WITH YOUR IMAGE */
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), url("background.jpg");
            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;

            /* This pushes the whole group down from the top */
            padding-top: 25vh; 
        }

        body::before {
            content:"";
            position:fixed;
            inset:0;
            background:rgba(0,0,0,0.15);
            pointer-events:none;
        }

        .container {
            width:90%;
            max-width:1000px;
            display:flex;
            flex-direction:column;
            align-items:center;
            text-align:center;
            z-index: 1;

            /* This is the master control for the 'perfect even spacing' */
            gap: 60px; 
        }

        .title {
            font-family: inherit;
            font-weight: bold;
            text-transform: lowercase;
            letter-spacing: 2px;
            font-size: 32px; 
            opacity: 0.9;
            margin: 0; /* Ensures the gap remains perfectly even */
        }

        .generate-btn {
            background:transparent;
            color:white;
            border:1px solid rgba(255,255,255,0.5);
            padding:14px 28px;
            font-size:16px;
            letter-spacing:3px;
            cursor:pointer;
            transition:0.25s ease;
            font-weight: bold;
            margin: 0;
            transform: translateY(20px); 
        }

        .generate-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: white;
            transform: translateY(20px) scale(1.03); 
}

        .quote {
            font-size:clamp(28px, 4vw, 52px);
            line-height:1.4;
            max-width:900px;
            margin: 0;
            min-height: 150px; 
            display: flex;
            align-items: center;
            justify-content: center;
            opacity:1;
            transition:opacity 0.25s ease;
            text-shadow: 0 0 10px rgba(0,0,0,0.5), 0 0 30px rgba(0,0,0,0.3);
            white-space: pre-line;
            overflow-wrap: normal;
        }

        .footer {
            font-size:12px;
            opacity:0.45;
            letter-spacing:2px;
            text-transform:lowercase;
            margin-top: 20px; 
        }

        @media(max-width:700px){
            body { padding-top: 15vh; }
            .container { gap: 40px; }
            .title { font-size: 24px; }
            .quote { font-size:30px; min-height: 120px; }
            .generate-btn { width:100%; max-width:300px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="title">random quote generator</div>
        
        <button class="generate-btn" onclick="generateQuote()">GENERATE</button>

        <div class="quote" id="quote">"there are no more chicken nuggets."</div>

        <div class="footer">— archived by sid</div>
    </div>

<script>
/* 1. This is where you type your quotes */
const rawQuotes = `

        we can still save the waffles.;
        some guy just apparated.;
        there is a chair in the parking lot behaving normally.;
`;

const quotes = rawQuotes.split(";").map(q => q.trim()).filter(q => q);
const quoteElement = document.getElementById("quote");
let deck = []; 

function generateQuote(isFirstLoad = false) {
    // If deck is empty, refill and shuffle
    if (deck.length === 0) {
        deck = [...quotes];
        for (let i = deck.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [deck[i], deck[j]] = [deck[j], deck[i]];
        }
    }

    const nextQuote = deck.pop();

    if (isFirstLoad) {
        quoteElement.textContent = `"${nextQuote}"`;
        quoteElement.style.opacity = 1;
    } else {
        quoteElement.style.opacity = 0;
        setTimeout(() => {
            quoteElement.textContent = `"${nextQuote}"`;
            quoteElement.style.opacity = 1;
        }, 250);
    }
}

// Starts the first quote immediately
generateQuote(true);

</script>
